<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KARTU KRIPTO ID</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
<style>
body { font-family: system-ui; background:#000; color:#fff; }
.glass { background: rgba(255,255,255,0.06); backdrop-filter: blur(20px); border:1px solid rgba(255,255,255,0.1); }
</style>
</head>
<body class="min-h-screen flex flex-col max-w-[390px] mx-auto">
<!-- HEADER -->
<header class="flex items-center justify-between p-4">
  <div class="flex items-center gap-2">
    <img src="https://api.dicebear.com/7.x/identicon/svg?seed=user" class="w-8 h-8 rounded-full">
    <div>
      <div class="text-xs opacity-60" data-name>Trader</div>
      <div class="text-[10px] opacity-40">Lv.1</div>
    </div>
  </div>
  <div class="flex items-center gap-2">
    <div class="glass px-2.5 py-1 rounded-full flex items-center gap-1">
      <span class="text-[10px]">💎</span>
      <span class="text-xs font-bold" data-diamond>0</span>
      <button onclick="showTopup()" class="ml-1 w-4 h-4 bg-violet-500 rounded-full text-[10px]">+</button>
    </div>
    <div class="glass px-2.5 py-1 rounded-full flex items-center gap-1">
      <span class="text-[10px]">🪙</span>
      <span class="text-xs" data-gold>0</span>
    </div>
  </div>
</header>

<!-- MAIN -->
<main class="flex-1 p-4 flex flex-col items-center justify-center">
  <div class="text-center mb-8">
    <h1 class="text-2xl font-black mb-2">KARTU KRIPTO ID</h1>
    <p class="text-sm opacity-60">Buka pack • Kumpulkan BTC & ETH</p>
  </div>
  
  <button onclick="openPack()" class="w-48 h-48 rounded-[32px] bg-gradient-to-br from-violet-600 to-fuchsia-600 flex flex-col items-center justify-center shadow-2xl active:scale-95 transition">
    <div class="text-5xl mb-2">📦</div>
    <div class="font-bold">BUKA PACK</div>
    <div class="text-xs opacity-80 mt-1">500 💎</div>
  </button>
  
  <p class="text-[11px] opacity-40 mt-6 text-center px-8">v3.0-FINAL • Topup tidak auto-tambah</p>
</main>

<!-- NAV -->
<nav class="grid grid-cols-3 border-t border-white/10">
  <button class="py-3 text-violet-400 text-xs">Beranda</button>
  <button class="py-3 opacity-50 text-xs">Koleksi</button>
  <button class="py-3 opacity-50 text-xs">Toko</button>
</nav>

<script>
console.log('GAME v3.0-FINAL loaded - topup CANNOT add diamond');

const SUPABASE_URL = 'https://iaionqdqtpenxbqamsrj.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhaW9ucWRxdHBlbnhicWFtc3JqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NTM5MzksImV4cCI6MjA5NDIyOTkzOX0.qG-6lsEuzYGgLTdojOEjDjf4kuvNnuMI__eJ9AU5HXs';
const GOPAY_NUMBER = '088989727277';
const GOPAY_NAME = 'Eko Koerniawan';

const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let tgUser = null;
let currentUser = null;

// Init
(async () => {
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.ready(); tg.expand(); tgUser = tg.initDataUnsafe?.user; }
  
  if (!tgUser) {
    alert('Buka dari Telegram!');
    tgUser = { id: 999999, first_name: 'Test', username: 'test' };
  }
  
  // Load user
  let { data } = await db.from('users').select('*').eq('telegram_id', tgUser.id).maybeSingle();
  if (!data) {
    const { data: nu } = await db.from('users').insert({
      telegram_id: tgUser.id,
      username: tgUser.username,
      first_name: tgUser.first_name,
      diamond: 0,
      gold: 0
    }).select().single();
    data = nu;
  }
  currentUser = data;
  updateUI();
})();

function updateUI() {
  document.querySelectorAll('[data-diamond]').forEach(el => el.textContent = currentUser.diamond);
  document.querySelectorAll('[data-gold]').forEach(el => el.textContent = (currentUser.gold||0).toLocaleString('id-ID'));
  document.querySelectorAll('[data-name]').forEach(el => el.textContent = currentUser.first_name);
}

// BUKA PACK - HANYA KURANGI
async function openPack() {
  if (currentUser.diamond < 500) {
    showTopup();
    return;
  }
  const newDiamond = currentUser.diamond - 500;
  await db.from('users').update({ diamond: newDiamond }).eq('id', currentUser.id);
  currentUser.diamond = newDiamond;
  updateUI();
  alert('✅ Pack dibuka! (500 diamond terpakai)');
}

// TOPUP - HANYA INSERT, TIDAK TAMBAH DIAMOND
async function createTopup(diamond, rupiah) {
  try {
    const before = currentUser.diamond;
    const { error } = await db.from('transactions').insert({
      user_id: currentUser.id,
      type: 'topup_gopay',
      amount_rupiah: rupiah,
      diamond_amount: diamond,
      gopay_number: GOPAY_NUMBER,
      status: 'pending'
    });
    if (error) throw error;
    
    alert(`✅ REQUEST TOPUP BERHASIL

Transfer: Rp ${rupiah.toLocaleString('id-ID')}
Ke GoPay: ${GOPAY_NUMBER}
a/n ${GOPAY_NAME}

⚠️ DIAMOND TIDAK BERTAMBAH OTOMATIS
Diamond kamu SEKARANG: ${before} (tetap)
Diamond akan masuk SETELAH admin approve di panel admin.

Cek status di admin dengan PIN 290916`);
  } catch(e) {
    alert('❌ Gagal: ' + e.message);
  }
}

function showTopup() {
  const m = document.createElement('div');
  m.className = 'fixed inset-0 bg-black/80 flex items-end justify-center z-50';
  m.innerHTML = `<div class="w-full max-w-[390px] bg-[#111] rounded-t-2xl p-5">
    <h3 class="font-bold text-lg mb-1">Top Up Diamond</h3>
    <p class="text-xs opacity-60 mb-3">Transfer ke ${GOPAY_NAME}</p>
    <div class="bg-white/5 p-3 rounded-xl mb-3 text-center font-mono">${GOPAY_NUMBER}</div>
    <div class="space-y-2">
      <button onclick="createTopup(60,5000);this.closest('.fixed').remove()" class="w-full p-3 bg-white/5 rounded-xl flex justify-between"><span>60 💎</span><b>Rp 5.000</b></button>
      <button onclick="createTopup(300,20000);this.closest('.fixed').remove()" class="w-full p-3 bg-amber-500/20 rounded-xl flex justify-between"><span>300 💎</span><b>Rp 20.000</b></button>
      <button onclick="createTopup(800,50000);this.closest('.fixed').remove()" class="w-full p-3 bg-violet-500/20 rounded-xl flex justify-between"><span>800 💎</span><b>Rp 50.000</b></button>
    </div>
    <button onclick="this.closest('.fixed').remove()" class="w-full mt-3 p-2.5 bg-white/10 rounded-xl text-sm">Tutup</button>
  </div>`;
  document.body.appendChild(m);
}
</script>
</body>
</html>
