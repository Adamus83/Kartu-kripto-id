<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADMIN - Kartu Kripto</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
<style>body{background:#000;color:#fff;font-family:system-ui}</style>
</head>
<body class="p-4 max-w-[480px] mx-auto">
<div id="login" class="min-h-screen flex items-center justify-center">
  <div class="w-full">
    <h1 class="text-2xl font-bold text-center mb-6">🔐 Admin Panel</h1>
    <input id="pin" type="password" placeholder="PIN" class="w-full p-3 bg-white/10 rounded-xl mb-3 text-center text-xl tracking-widest">
    <button onclick="checkPin()" class="w-full p-3 bg-violet-600 rounded-xl font-bold">Masuk</button>
    <p class="text-xs opacity-40 text-center mt-4">GoPay: 088989727277 a/n Eko Koerniawan</p>
  </div>
</div>

<div id="panel" class="hidden">
  <div class="flex justify-between items-center mb-4">
    <h2 class="text-xl font-bold">Dashboard</h2>
    <button onclick="loadData()" class="px-3 py-1.5 bg-white/10 rounded-lg text-sm">Refresh</button>
  </div>
  
  <div class="grid grid-cols-3 gap-2 mb-4">
    <div class="bg-white/5 p-3 rounded-xl text-center"><div class="text-[10px] opacity-60">User</div><div id="stat-users" class="font-bold">-</div></div>
    <div class="bg-amber-500/10 p-3 rounded-xl text-center"><div class="text-[10px] text-amber-400">Pending</div><div id="stat-pending" class="font-bold text-amber-400">-</div></div>
    <div class="bg-green-500/10 p-3 rounded-xl text-center"><div class="text-[10px] text-green-400">Revenue</div><div id="stat-rev" class="font-bold text-green-400 text-xs">-</div></div>
  </div>
  
  <div id="list" class="space-y-2"></div>
</div>

<script>
const SUPABASE_URL = 'https://iaionqdqtpenxbqamsrj.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhaW9ucWRxdHBlbnhicWFtc3JqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NTM5MzksImV4cCI6MjA5NDIyOTkzOX0.qG-6lsEuzYGgLTdojOEjDjf4kuvNnuMI__eJ9AU5HXs';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function checkPin() {
  if (document.getElementById('pin').value === '290916') {
    document.getElementById('login').classList.add('hidden');
    document.getElementById('panel').classList.remove('hidden');
    loadData();
  } else {
    alert('PIN salah!');
  }
}

async function loadData() {
  const { count } = await db.from('users').select('*', {count:'exact', head:true});
  const { data: pending } = await db.from('transactions').select('*, users(first_name,username)').eq('status','pending').order('created_at',{ascending:false});
  const { data: done } = await db.from('transactions').select('amount_rupiah').eq('status','completed');
  
  document.getElementById('stat-users').textContent = count||0;
  document.getElementById('stat-pending').textContent = pending?.length||0;
  const rev = (done||[]).reduce((a,b)=>a+(b.amount_rupiah||0),0);
  document.getElementById('stat-rev').textContent = 'Rp'+Math.round(rev/1000)+'k';
  
  const list = document.getElementById('list');
  if (!pending || pending.length===0) {
    list.innerHTML = '<div class="text-center py-12 opacity-50">Tidak ada pending</div>';
    return;
  }
  
  list.innerHTML = pending.map(tx => `
    <div class="bg-white/5 p-3 rounded-xl">
      <div class="flex justify-between items-start">
        <div>
          <div class="font-medium">${tx.users?.first_name||'User'}</div>
          <div class="text-xs opacity-60">@${tx.users?.username||'-'} • ${new Date(tx.created_at).toLocaleTimeString('id-ID')}</div>
          <div class="mt-1.5 flex gap-2">
            <span class="text-xs px-2 py-0.5 bg-violet-500/20 text-violet-300 rounded-full">${tx.diamond_amount} 💎</span>
            <span class="text-xs font-medium">Rp ${tx.amount_rupiah.toLocaleString('id-ID')}</span>
          </div>
        </div>
        <button onclick="approve('${tx.id}','${tx.user_id}',${tx.diamond_amount},this)" class="px-3 py-1.5 bg-green-600 rounded-lg text-xs font-medium">Approve</button>
      </div>
    </div>
  `).join('');
}

async function approve(txId, userId, diamond, btn) {
  if (!confirm(`Approve ${diamond} diamond?`)) return;
  btn.disabled = true; btn.textContent = '...';
  try {
    const { data: u } = await db.from('users').select('diamond').eq('id', userId).single();
    await db.from('users').update({ diamond: (u.diamond||0)+diamond }).eq('id', userId);
    await db.from('transactions').update({ status:'completed', completed_at: new Date().toISOString() }).eq('id', txId);
    btn.textContent = '✓'; btn.className = 'px-3 py-1.5 bg-white/10 rounded-lg text-xs';
    setTimeout(loadData, 800);
  } catch(e) {
    alert('Error: '+e.message); btn.disabled=false; btn.textContent='Approve';
  }
}
</script>
</body>
</html>
