<script>// Playables SDK v1.0.0
// Game lifecycle bridge: rAF-based game-ready detection + event communication
(function() {
  'use strict';

  // Idempotency: skip if already initialized (e.g., server-side injection
  // followed by client-side inject-javascript via the Bloks webview component).
  if (window.playablesSDK) return;

  var HANDLER_NAME = 'playablesGameEventHandler';
  var ANDROID_BRIDGE_NAME = '_MetaPlayablesBridge';
  var RAF_FRAME_THRESHOLD = 3;

  var gameReadySent = false;
  var firstInteractionSent = false;
  var errorSent = false;
  var frameCount = 0;
  var originalRAF = window.requestAnimationFrame;

  // --- Transport Layer ---

  function hasIOSBridge() {
    return !!(window.webkit &&
              window.webkit.messageHandlers &&
              window.webkit.messageHandlers[HANDLER_NAME]);
  }

  function hasAndroidBridge() {
    return !!(window[ANDROID_BRIDGE_NAME] &&
              typeof window[ANDROID_BRIDGE_NAME].postEvent === 'function');
  }

  function isInIframe() {
    return !!(window.parent && window.parent !== window);
  }

  function sendEvent(eventName, payload) {
    var message = {
      type: eventName,
      payload: payload || {},
      timestamp: Date.now()
    };

    if (hasIOSBridge()) {
      try {
        window.webkit.messageHandlers[HANDLER_NAME].postMessage(message);
      } catch (e) { /* ignore */ }
      return;
    }

    if (hasAndroidBridge()) {
    try {
      var p = payload || {};
      p.__secureToken = window.__fbAndroidBridgeAuthToken || '';
      p.timestamp = message.timestamp;
      window[ANDROID_BRIDGE_NAME].postEvent(
        eventName,
        JSON.stringify(p)
      );
    } catch (e) { /* ignore */ }
    return;
  }

    if (isInIframe()) {
      try {
        window.parent.postMessage(message, '*');
      } catch (e) { /* ignore */ }
      return;
    }
  }

  // --- rAF Game-Ready Detection ---

  function onFrame() {
    if (gameReadySent) return;

    frameCount++;
    if (frameCount >= RAF_FRAME_THRESHOLD) {
      gameReadySent = true;
      sendEvent('game_ready', {
        frame_count: frameCount,
        detected_at: Date.now()
      });
      return;
    }

    originalRAF.call(window, onFrame);
  }

  if (originalRAF) {
    window.requestAnimationFrame = function(callback) {
      if (!gameReadySent) {
        return originalRAF.call(window, function(timestamp) {
          frameCount++;
          if (frameCount >= RAF_FRAME_THRESHOLD && !gameReadySent) {
            gameReadySent = true;
            sendEvent('game_ready', {
              frame_count: frameCount,
              detected_at: Date.now()
            });
          }
          callback(timestamp);
        });
      }
      return originalRAF.call(window, callback);
    };
  }

  // --- First User Interaction Detection ---

  function setupFirstInteractionDetection() {
    var events = ['touchstart', 'mousedown', 'keydown'];

    function onFirstInteraction() {
      if (firstInteractionSent) return;
      firstInteractionSent = true;
      sendEvent('user_interaction_start', null);

      for (var i = 0; i < events.length; i++) {
        document.removeEventListener(events[i], onFirstInteraction, true);
      }
    }

    for (var i = 0; i < events.length; i++) {
      document.addEventListener(events[i], onFirstInteraction, true);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setupFirstInteractionDetection);
  } else {
    setupFirstInteractionDetection();
  }

  // --- Auto Error Capture ---

  window.addEventListener('error', function(event) {
    if (errorSent) return;
    errorSent = true;
    sendEvent('error', {
      message: event.message || 'Unknown error',
      source: event.filename || '',
      lineno: event.lineno || 0,
      colno: event.colno || 0,
      auto_captured: true
    });
  });

  window.addEventListener('unhandledrejection', function(event) {
    if (errorSent) return;
    errorSent = true;
    var reason = event.reason;
    sendEvent('error', {
      message: (reason instanceof Error) ? reason.message : String(reason),
      type: 'unhandled_promise_rejection',
      auto_captured: true
    });
  });

  // --- Public API ---

  window.playablesSDK = {
    complete: function(score) {
      sendEvent('game_ended', {
        score: score,
        completed: true
      });
    },

    error: function(message) {
      if (errorSent) return;
      errorSent = true;
      sendEvent('error', {
        message: message || 'Unknown error',
        auto_captured: false
      });
    },

    sendEvent: function(eventName, payload) {
      if (!eventName || typeof eventName !== 'string') return;
      sendEvent(eventName, payload);
    }
  };

  // Kick off rAF detection in case no game code calls rAF immediately
  if (originalRAF) {
    originalRAF.call(window, onFrame);
  }
})();</script>

<style>
body { background: #000; color: #fff; font-family: system-ui; }

</head>
<body class="min-h-screen">
<div id="login" class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="text-4xl mb-2">🔐</div>
      <h1 class="text-2xl font-bold">Admin Panel</h1>
      <p class="text-sm opacity-60 mt-1">Kartu Kripto ID</p>
    </div>
    <input id="pin" type="password" placeholder="Masukkan PIN" 
           class="w-full p-4 bg-white/5 border border-white/10 rounded-2xl text-center text-2xl tracking-[0.5em] mb-4 focus:outline-none focus:border-violet-500">
    <button onclick="login()" class="w-full p-4 bg-violet-600 rounded-2xl font-bold active:scale-95 transition">Masuk</button>
    <p class="text-[11px] opacity-40 text-center mt-6">GoPay: 088989727277<br>a/n Eko Koerniawan</p>
  </div>
</div>

<div id="dashboard" class="hidden p-4 max-w-[480px] mx-auto">
  <div class="flex items-center justify-between mb-6">
    <h2 class="text-xl font-bold">Dashboard</h2>
    <div class="flex gap-2">
      <button onclick="load()" class="px-3 py-1.5 bg-white/10 rounded-lg text-xs">Refresh</button>
      <button onclick="logout()" class="px-3 py-1.5 bg-red-500/20 text-red-400 rounded-lg text-xs">Keluar</button>

  </div>

  <div class="grid grid-cols-3 gap-3 mb-6">

      <div class="text-[10px] text-amber-400 mb-1">Pending</div>
      <div id="s2" class="text-xl font-bold text-amber-400">-</div>

      <div class="text-[10px] text-green-400 mb-1">Revenue</div>
      <div id="s3" class="text-lg font-bold text-green-400">-</div>
    </div>
  </div>

  <div class="mb-3 flex items-center justify-between">

    <span class="text-[10px] px-2 py-0.5 bg-amber-500/20 text-amber-400 rounded-full">Perlu Approve</span>
  </div>
  
  <div id="list" class="space-y-2.5"></div>
  
  <div id="empty" class="hidden text-center py-16 opacity-40">
    <div class="text-3xl mb-2">✓</div>

  </div>
</div>

<script>
const SUPABASE_URL = 'https://iaionqdqtpenxbqamsrj.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlhaW9ucWRxdHBlbnhicWFtc3JqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NTM5MzksImV4cCI6MjA5NDIyOTkzOX0.qG-6lsEuzYGgLTdojOEjDjf4kuvNnuMI__eJ9AU5HXs';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function login() {
  const pin = document.getElementById('pin').value;
  if (pin === '290916') {
    document.getElementById('login').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
    load();
  } else {
    alert('PIN salah!');
    document.getElementById('pin').value = '';
  }
}

function logout() {
  document.getElementById('dashboard').classList.add('hidden');
  document.getElementById('login').classList.remove('hidden');
  document.getElementById('pin').value = '';
}

async function load() {
  try {
    // Stats
    const { count: users } = await db.from('users').select('*', { count: 'exact', head: true });
    const { data: pending } = await db.from('transactions').select('*, users(first_name,username)').eq('status','pending').order('created_at', {ascending:false});
    const { data: completed } = await db.from('transactions').select('amount_rupiah').eq('status','completed');
    
    document.getElementById('s1').textContent = users || 0;
    document.getElementById('s2').textContent = pending?.length || 0;
    const revenue = (completed||[]).reduce((sum, tx) => sum + (tx.amount_rupiah||0), 0);
    document.getElementById('s3').textContent = 'Rp' + (revenue/1000).toFixed(0) + 'k';
    
    // List
    const list = document.getElementById('list');
    const empty = document.getElementById('empty');
    
    if (!pending || pending.length === 0) {
      list.innerHTML = '';
      empty.classList.remove('hidden');
      return;
    }
    
    empty.classList.add('hidden');
    list.innerHTML = pending.map(tx => {
      const time = new Date(tx.created_at).toLocaleString('id-ID', { hour:'2-digit', minute:'2-digit', day:'2-digit', month:'short' });
      return `
        <div class="bg-white/[0.03] border border-white/10 rounded-2xl p-3.5">
          <div class="flex items-start justify-between">
            <div class="flex-1">
              <div class="flex items-center gap-2 mb-1">
                <div class="w-8 h-8 rounded-full bg-violet-500/20 flex items-center justify-center text-xs font-bold">${(tx.users?.first_name||'U').charAt(0)}</div>
                <div>
                  <div class="font-medium text-sm">${tx.users?.first_name || 'User'}</div>
                  <div class="text-[11px] opacity-50">@${tx.users?.username || '-'} • ${time}</div>
                </div>
              </div>
              <div class="flex items-center gap-2 mt-2.5 ml-10">
                <span class="text-[11px] px-2.5 py-1 bg-violet-500/20 text-violet-300 rounded-full font-medium">${tx.diamond_amount} 💎</span>
                <span class="text-xs font-semibold">Rp ${tx.amount_rupiah.toLocaleString('id-ID')}</span>
              </div>
            </div>
            <button onclick="approve('${tx.id}','${tx.user_id}',${tx.diamond_amount},this)" 
                    class="ml-3 px-4 py-2 bg-green-600 hover:bg-green-500 rounded-xl text-xs font-bold transition active:scale-95">
              Approve
            </button>
          </div>
        </div>
      `;
    }).join('');
  } catch(e) {
    alert('Error load: ' + e.message);
  }
}

async function approve(txId, userId, diamond, btn) {
  if (!confirm(`Approve ${diamond} diamond untuk user ini?

Pastikan sudah cek transfer GoPay ke Eko Koerniawan`)) return;
  
  const originalText = btn.textContent;
  btn.disabled = true;
  btn.textContent = '...';
  btn.classList.add('opacity-50');
  
  try {
    // Get current diamond
    const { data: user, error: e1 } = await db.from('users').select('diamond').eq('id', userId).single();
    if (e1) throw e1;
    
    const newDiamond = (user.diamond || 0) + diamond;
    
    // Update user
    const { error: e2 } = await db.from('users').update({ diamond: newDiamond }).eq('id', userId);
    if (e2) throw e2;
    
    // Update transaction
    const { error: e3 } = await db.from('transactions').update({ 
      status: 'completed',
      completed_at: new Date().toISOString()
    }).eq('id', txId);
    if (e3) throw e3;
    
    btn.textContent = '✓ Done';
    btn.classList.remove('bg-green-600', 'hover:bg-green-500');
    btn.classList.add('bg-white/10', 'text-white/50');
    
    setTimeout(() => load(), 1000);
    
  } catch(e) {
    alert('Gagal approve: ' + e.message);
    btn.disabled = false;
    btn.textContent = originalText;
    btn.classList.remove('opacity-50');
  }
}

// Enter key for PIN
document.getElementById('pin')?.addEventListener('keypress', e => {
  if (e.key === 'Enter') login();
});
</script>
